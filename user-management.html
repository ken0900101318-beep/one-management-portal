<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工管理 - ONE桌遊管理系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="../one-quote-system/one-logo.jpg" alt="ONE桌遊" style="width: 35px; height: 35px; border-radius: 50%; vertical-align: middle; margin-right: 10px;">
            ONE桌遊管理系統
        </div>
        <div class="navbar-user">
            <div class="user-info">
                <div class="user-name" id="userName">載入中...</div>
                <div class="user-role" id="userRole">-</div>
            </div>
            <button class="btn-logout" onclick="location.href='menu.html'">← 返回選單</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">👥 員工管理</h2>
                <button class="btn btn-primary" onclick="openAddUserModal()">➕ 新增員工</button>
            </div>

            <table class="table">
                <thead>
                    <tr>
                        <th>頭像</th>
                        <th>姓名</th>
                        <th>帳號</th>
                        <th>權限</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="usersBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 新增/編輯員工 Modal -->
    <div class="modal" id="userModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新增員工</h3>
                <span class="modal-close" onclick="closeUserModal()">×</span>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <div class="form-row">
                        <label>頭像 Emoji</label>
                        <input type="text" id="userAvatar" required placeholder="例如：👨‍💼" maxlength="2">
                    </div>
                    <div class="form-row">
                        <label>姓名 *</label>
                        <input type="text" id="userFormName" required placeholder="例如：阿建">
                    </div>
                    <div class="form-row">
                        <label>帳號（登入用）*</label>
                        <input type="text" id="userUsername" required placeholder="例如：admin">
                    </div>
                    <div class="form-row">
                        <label>密碼 *</label>
                        <input type="password" id="userPassword" required placeholder="至少 6 位數">
                        <small style="color: #666;">編輯時留空表示不修改密碼</small>
                    </div>
                    <div class="form-row">
                        <label>權限 *</label>
                        <select id="userRole" required onchange="console.log('權限已變更為:', this.value)">
                            <option value="">請選擇...</option>
                            <option value="admin">主管（可管理所有功能）</option>
                            <option value="staff">員工（可新增編輯專案）</option>
                            <option value="viewer">會計（僅查看）</option>
                        </select>
                        <small style="color: #666; display: block; margin-top: 5px;">
                            目前選擇：<span id="currentRoleDisplay">-</span>
                        </small>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeUserModal()">取消</button>
                <button class="btn btn-primary" onclick="saveUser()">儲存</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script>
        // 檢查登入狀態
        const currentUser = JSON.parse(localStorage.getItem('oneCurrentUser'));
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        // 權限控制：只有主管可以管理員工
        if (currentUser.role !== 'admin') {
            alert('⚠️ 您沒有權限訪問此頁面\n\n此功能僅限主管使用。');
            window.location.href = 'menu.html';
        }

        // 顯示使用者資訊
        const roleNames = {
            'admin': '主管',
            'staff': '員工',
            'viewer': '會計（查看）'
        };
        document.getElementById('userName').textContent = currentUser.avatar + ' ' + currentUser.name;
        document.getElementById('userRole').textContent = roleNames[currentUser.role];

        let users = [];
        let editingUserId = null;

        async function init() {
            console.log('初始化：載入員工資料...');
            await loadUsers();
        }

        async function loadUsers() {
            try {
                console.log('🔄 從雲端讀取員工資料...');
                const result = await API.getUsers();
                
                if (result.success) {
                    users = result.users;
                    console.log('✅ 載入成功:', users.length, '位員工');
                    
                    const usersBody = document.getElementById('usersBody');
                    usersBody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.avatar}</td>
                    <td>${user.name}</td>
                    <td>${user.username}</td>
                    <td>
                        <span class="status-badge ${user.role === 'admin' ? 'status-signed' : user.role === 'staff' ? 'status-construction' : 'status-quoted'}">
                            ${roleNames[user.role]}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-secondary" onclick="editUser('${user.id}')">編輯</button>
                        ${user.id !== currentUser.id ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${user.id}')">刪除</button>` : ''}
                    </td>
                </tr>
            `).join('');
                } else {
                    alert('❌ 載入失敗：' + (result.error || '未知錯誤'));
                }
            } catch (error) {
                console.error('載入員工資料失敗:', error);
                alert('❌ 連線失敗：' + error.message);
            }
        }

        function openAddUserModal() {
            editingUserId = null;
            document.getElementById('modalTitle').textContent = '新增員工';
            document.getElementById('userForm').reset();
            document.getElementById('userPassword').required = true;
            document.getElementById('userModal').classList.add('show');
        }

        function editUser(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) {
                alert('找不到該員工！');
                return;
            }

            console.log('編輯員工：', user);
            
            editingUserId = userId;
            document.getElementById('modalTitle').textContent = '編輯員工';
            document.getElementById('userAvatar').value = user.avatar;
            document.getElementById('userFormName').value = user.name;
            document.getElementById('userUsername').value = user.username;
            document.getElementById('userPassword').value = '';
            document.getElementById('userPassword').required = false;
            document.getElementById('userRole').value = user.role;
            
            document.getElementById('userModal').classList.add('show');
        }

        function closeUserModal() {
            document.getElementById('userForm').reset();
            document.getElementById('userModal').classList.remove('show');
            editingUserId = null;
        }

        async function saveUser() {
            const avatar = document.getElementById('userAvatar').value.trim();
            const name = document.getElementById('userFormName').value.trim();
            const username = document.getElementById('userUsername').value.trim();
            const password = document.getElementById('userPassword').value;
            const role = document.getElementById('userRole').value;

            console.log('準備儲存：', {avatar, name, username, role, password: password ? '***已設定***' : '(未變更)', editingUserId});

            if (!avatar || !name || !username || !role) {
                alert('請填寫所有必填欄位！');
                return;
            }

            if (!editingUserId && !password) {
                alert('新增員工時密碼為必填！');
                return;
            }

            if (password && password.length < 6) {
                alert('密碼至少需要 6 位數！');
                return;
            }

            // 儲存到雲端
            try {
                let result;
                
                if (editingUserId) {
                    // 編輯模式
                    console.log('🔧 更新員工資料:', editingUserId);
                    result = await API.updateUser(editingUserId, {
                        avatar, name, username, password, role
                    });
                } else {
                    // 新增模式
                    console.log('➕ 新增員工');
                    result = await API.addUser({
                        avatar, name, username, password, role
                    });
                }
                
                if (result.success) {
                    alert('✅ ' + result.message + '\n\n' + 
                          `姓名：${name}\n` +
                          `帳號：${username}\n` +
                          `權限：${roleNames[role]}\n` +
                          (password ? '✅ 密碼已設定' : '⚠️ 密碼未變更'));
                    
                    closeUserModal();
                    await loadUsers();
                    
                    // 如果修改了當前用戶，重新載入頁面
                    if (editingUserId === currentUser.id) {
                        setTimeout(() => {
                            alert('✅ 您的資料已更新，頁面即將重新載入');
                            location.reload();
                        }, 500);
                    }
                } else {
                    alert('❌ ' + (result.error || '儲存失敗'));
                }
            } catch (error) {
                console.error('儲存失敗:', error);
                alert('❌ 連線失敗：' + error.message);
            }
        }

        async function deleteUser(userId) {
            if (userId === currentUser.id) {
                alert('無法刪除自己的帳號！');
                return;
            }

            const user = users.find(u => u.id === userId);
            if (!user) return;

            if (!confirm(`確定要刪除員工「${user.name}」嗎？\n\n此操作無法復原！`)) {
                return;
            }

            try {
                console.log('🗑️ 刪除員工:', userId);
                const result = await API.deleteUser(userId);
                
                if (result.success) {
                    alert('✅ ' + result.message);
                    await loadUsers();
                } else {
                    alert('❌ ' + (result.error || '刪除失敗'));
                }
            } catch (error) {
                console.error('刪除失敗:', error);
                alert('❌ 連線失敗：' + error.message);
            }
        }

        init();
    </script>
</body>
</html>
