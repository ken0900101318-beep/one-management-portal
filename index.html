<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE桌遊管理系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <img src="../one-quote-system/one-logo.jpg" alt="ONE桌遊" style="width: 100px; height: 100px; border-radius: 50%; margin-bottom: 15px;">
                <h1>ONE桌遊</h1>
                <p>管理系統入口</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">👤 帳號</label>
                    <input type="text" id="username" placeholder="請輸入帳號" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">🔒 密碼</label>
                    <input type="password" id="password" placeholder="請輸入密碼" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    登入系統
                </button>
            </form>
            
            <div class="login-footer">
                <p>© 2026 ONE桌遊 | 版本 v1.0</p>
            </div>
        </div>
    </div>

    <script src="config.js?v=2"></script>
    <script src="api.js?v=2"></script>
    <script>
        // 登入處理
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = this.querySelector('button[type="submit"]');
            
            // 顯示載入中
            submitBtn.disabled = true;
            submitBtn.textContent = '登入中...';
            
            try {
                console.log('🔐 正在驗證登入...');
                const result = await API.login(username, password);
                
                console.log('登入結果:', result);
                
                if (result.success) {
                    // 登入成功
                    console.log('✅ 登入成功:', result.user.name);
                    localStorage.setItem('oneCurrentUser', JSON.stringify(result.user));
                    
                    // 同步到報價系統
                    localStorage.setItem('currentUser', JSON.stringify(result.user));
                    
                    window.location.href = 'menu.html';
                } else {
                    alert('❌ ' + (result.error || '登入失敗，請重試'));
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                console.error('登入錯誤:', error);
                alert('❌ 連線失敗：' + error.message + '\n\n請檢查網路連線或聯絡系統管理員。');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '登入系統';
            }
        });

        // 檢查是否已登入
        const currentUser = localStorage.getItem('oneCurrentUser');
        if (currentUser) {
            window.location.href = 'menu.html';
        }
    </script>
</body>
</html>
