<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE桌遊管理系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <img src="../one-quote-system/one-logo.jpg" alt="ONE桌遊" style="width: 100px; height: 100px; border-radius: 50%; margin-bottom: 15px;">
                <h1>ONE桌遊</h1>
                <p>管理系統入口</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">👤 帳號</label>
                    <input type="text" id="username" placeholder="請輸入帳號" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">🔒 密碼</label>
                    <input type="password" id="password" placeholder="請輸入密碼" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    登入系統
                </button>
            </form>
            
            <div class="login-footer">
                <p>© 2026 ONE桌遊 | 版本 v1.0</p>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // 登入處理
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // 從 localStorage 讀取使用者列表
            const users = JSON.parse(localStorage.getItem('oneUsers') || '[]');
            
            // 除錯用：顯示當前使用者列表（可選）
            console.log('系統使用者列表:', users.map(u => ({
                username: u.username,
                name: u.name,
                role: u.role
            })));
            
            // 尋找匹配的使用者
            const user = users.find(u => 
                u.username === username && u.password === password
            );
            
            if (user) {
                // 登入成功
                console.log('登入成功:', user.name);
                localStorage.setItem('oneCurrentUser', JSON.stringify(user));
                
                // 同步到報價系統
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                window.location.href = 'menu.html';
            } else {
                // 登入失敗：檢查是帳號還是密碼錯誤
                const userExists = users.find(u => u.username === username);
                
                if (!userExists) {
                    alert('❌ 帳號不存在！\n\n請確認您的帳號是否正確。');
                } else {
                    alert('❌ 密碼錯誤！\n\n請確認您的密碼是否正確。\n如果忘記密碼，請聯絡主管重設。');
                }
                
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        // 檢查是否已登入
        const currentUser = localStorage.getItem('oneCurrentUser');
        if (currentUser) {
            window.location.href = 'menu.html';
        }
        
        // 確保數據已初始化
        if (typeof initializeData === 'function') {
            initializeData();
        }
    </script>
</body>
</html>
