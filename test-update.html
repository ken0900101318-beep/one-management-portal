<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測試更新功能</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; font-size: 16px; }
        #log { border: 1px solid #ccc; padding: 10px; margin-top: 20px; max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>員工管理測試頁面</h1>
    
    <div>
        <button onclick="test1()">測試1：改小圓為 staff</button>
        <button onclick="test2()">測試2：改小圓為 admin</button>
        <button onclick="test3()">測試3：讀取所有員工</button>
    </div>
    
    <div id="log"></div>

    <script>
        const API_ENDPOINT = 'https://script.google.com/macros/s/AKfycbz00HGH3_TaJ7CITqVg-R-qCfvYRBJEns-3IovcpGG9cbj1Kb5EuQ4QEDKfts0Rt4QC/exec';
        
        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        async function test1() {
            log('開始測試：改小圓為 staff');
            try {
                const url = `${API_ENDPOINT}?action=updateUser&userId=USR-XIAOYUAN&user=${encodeURIComponent(JSON.stringify({
                    avatar: '👨',
                    name: '小圓',
                    username: '0966428064',
                    password: '',
                    role: 'staff'
                }))}&_t=${Date.now()}`;
                
                log('請求 URL: ' + url);
                
                const response = await fetch(url);
                const result = await response.json();
                
                log('回應: ' + JSON.stringify(result));
                
                // 等2秒後讀取確認
                setTimeout(test3, 2000);
            } catch (error) {
                log('錯誤: ' + error.message);
            }
        }
        
        async function test2() {
            log('開始測試：改小圓為 admin');
            try {
                const url = `${API_ENDPOINT}?action=updateUser&userId=USR-XIAOYUAN&user=${encodeURIComponent(JSON.stringify({
                    avatar: '👨',
                    name: '小圓',
                    username: '0966428064',
                    password: '',
                    role: 'admin'
                }))}&_t=${Date.now()}`;
                
                log('請求 URL: ' + url);
                
                const response = await fetch(url);
                const result = await response.json();
                
                log('回應: ' + JSON.stringify(result));
                
                // 等2秒後讀取確認
                setTimeout(test3, 2000);
            } catch (error) {
                log('錯誤: ' + error.message);
            }
        }
        
        async function test3() {
            log('開始測試：讀取所有員工');
            try {
                const url = `${API_ENDPOINT}?action=getUsers&_t=${Date.now()}`;
                
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success) {
                    const xiaoyuan = result.users.find(u => u.id === 'USR-XIAOYUAN');
                    if (xiaoyuan) {
                        log(`小圓目前狀態: 姓名=${xiaoyuan.name} 帳號=${xiaoyuan.username} 權限=${xiaoyuan.role}`);
                    } else {
                        log('找不到小圓！');
                    }
                } else {
                    log('讀取失敗: ' + result.error);
                }
            } catch (error) {
                log('錯誤: ' + error.message);
            }
        }
        
        // 頁面載入時先讀取一次
        window.onload = test3;
    </script>
</body>
</html>
