<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統選單 - ONE桌遊管理系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="../one-quote-system/one-logo.jpg" alt="ONE桌遊" style="width: 35px; height: 35px; border-radius: 50%; vertical-align: middle; margin-right: 10px;">
            ONE桌遊管理系統
        </div>
        <div class="navbar-user">
            <div class="user-info">
                <div class="user-name" id="userName">載入中...</div>
                <div class="user-role" id="userRole">-</div>
            </div>
            <button class="btn-logout" onclick="logout()">登出</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">🎯 系統選單</h2>
            </div>

            <div style="padding: 30px;">
                <div class="system-grid">
                    <!-- 加盟報價系統 -->
                    <div class="system-card" onclick="openSystem('quote')">
                        <div class="system-icon">📋</div>
                        <h3>加盟報價系統</h3>
                        <p>管理加盟店報價、專案進度、收款記錄</p>
                        <div class="system-status">✅ 運行中</div>
                    </div>

                    <!-- 倉儲管理系統 -->
                    <div class="system-card" onclick="openSystem('warehouse')">
                        <div class="system-icon">📦</div>
                        <h3>倉儲管理系統</h3>
                        <p>管理庫存、進出貨、盤點作業</p>
                        <div class="system-status">✅ 運行中</div>
                    </div>

                    <!-- 打掃系統 -->
                    <div class="system-card" onclick="openSystem('cleaning')">
                        <div class="system-icon">🧹</div>
                        <h3>打掃系統</h3>
                        <p>管理打掃人員、SOP、備品、故障回報</p>
                        <div class="system-status">✅ 運行中</div>
                    </div>

                    <!-- 員工管理 -->
                    <div class="system-card" onclick="openSystem('users')" id="userManagementCard">
                        <div class="system-icon">👥</div>
                        <h3>員工管理</h3>
                        <p>管理所有系統的使用者帳號</p>
                        <div class="system-status">✅ 運行中</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // 檢查登入狀態
        const currentUser = JSON.parse(localStorage.getItem('oneCurrentUser'));
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        // 顯示使用者資訊
        const roleNames = {
            'admin': '主管',
            'staff': '員工',
            'viewer': '會計（查看）'
        };
        document.getElementById('userName').textContent = currentUser.avatar + ' ' + currentUser.name;
        document.getElementById('userRole').textContent = roleNames[currentUser.role];

        // 權限控制
        if (currentUser.role !== 'admin') {
            document.getElementById('userManagementCard').style.display = 'none';
        }

        function openSystem(system) {
            switch(system) {
                case 'quote':
                    // 設定報價系統的登入狀態
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    window.location.href = '../one-quote-system/dashboard.html';
                    break;
                case 'warehouse':
                    window.open('http://localhost:3001', '_blank');
                    break;
                case 'cleaning':
                    window.open('http://localhost:3000', '_blank');
                    break;
                case 'users':
                    if (currentUser.role === 'admin') {
                        window.location.href = 'user-management.html';
                    } else {
                        alert('您沒有權限訪問員工管理！');
                    }
                    break;
            }
        }

        function logout() {
            localStorage.removeItem('oneCurrentUser');
            localStorage.removeItem('currentUser'); // 清除報價系統登入狀態
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
